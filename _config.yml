# Aether Programming Language - GitHub Pages Configuration

# Site settings
title: Aether Programming Language
description: A general-purpose, dynamically typed programming language with automatic memory management
author: Aether Contributors
baseurl: "" # Leave empty for project pages
url: "https://valarpirai.github.io/aether"

# Theme
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
# Alternative themes: pages-themes/minimal, pages-themes/slate

# Build settings
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    default_lang: rust

# Navigation
header_pages:
  - index.md
  - DESIGN.md
  - ARCHITECTURE.md
  - DEVELOPMENT.md

# Collections (if using custom collections later)
collections:
  docs:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "docs"
    values:
      layout: "default"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Additional plugins
# Note: jekyll-remote-theme is already listed above with theme

# SEO
logo: /assets/logo.png
twitter:
  username: aether_lang
  card: summary
social:
  name: Aether Programming Language
  links:
    - https://github.com/valarpirai/aether

# GitHub
repository: valarpirai/aether
