# Aether Programming Language - GitHub Pages Configuration

# Site settings
title: Aether Programming Language
description: A general-purpose, dynamically typed programming language with automatic memory management
author: Aether Contributors
baseurl: "/aether"
url: "https://valarpirai.github.io"

# Theme
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme

# Build settings
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    default_lang: rust

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - CLAUDE.md

# GitHub
repository: valarpirai/aether
github_username: valarpirai
